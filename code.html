<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas Portfolio</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#111;
            color:white;
        }

        header{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            text-align:center;
        }

        h1{
            font-size:60px;
            margin-bottom:20px;
        }

        p{
            font-size:20px;
            color:#bdbdbd;
            margin-bottom:30px;
        }

        button{
            padding:15px 30px;
            border:none;
            border-radius:10px;
            background:white;
            color:black;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            transform:scale(1.05);
        }
    </style>
</head>
<body>

    <header>
        <h1>Hello, I'm Atlas</h1>
        <p>Future Frontend Developer</p>

        <button>View Projects</button>
    </header>

</body>
</html>
